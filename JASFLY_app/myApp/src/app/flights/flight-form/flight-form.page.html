<ion-header [translucent]="true">
  <div class="custom-header">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/flight-list" text="" icon="chevron-back-outline"></ion-back-button>
    </ion-buttons>
    <div class="logo-container">
      <img src="assets/helicopter.svg" alt="JASFLY" class="logo-icon" />
      <span class="company-name">JASFLY S.A.</span>
    </div>
    <ion-button fill="clear" class="menu-btn">
      <div class="hamburger"></div>
    </ion-button>
  </div>
</ion-header>

<ion-content [fullscreen]="true">

  <div *ngIf="mode === 'new' || mode === 'edit'">
    <div class="page-title">{{ mode === 'new' ? 'Nuevo Registro de Vuelo' : 'Editar Registro' }}</div>

    <div class="form-container">

      <!-- Sección: Aeronave -->
      <div class="form-section">
        <span class="section-label">AERONAVE</span>
        <div class="field-card">
          <ion-item lines="none">
            <ion-select [(ngModel)]="flight.helicopteroId" interface="popover" placeholder="Seleccione helicóptero"
              label="Helicóptero" labelPlacement="stacked">
              <ion-select-option *ngFor="let heli of helicopters" [value]="heli.id">{{ heli.modelo
                }}</ion-select-option>
            </ion-select>
          </ion-item>
        </div>
      </div>

      <!-- Sección: Ruta -->
      <div class="form-section">
        <span class="section-label">RUTA</span>
        <div class="field-card">
          <ion-item lines="inset">
            <ion-input type="text" [(ngModel)]="flight.origen" placeholder="Ej: Base JASFLY" label="Origen"
              labelPlacement="stacked"></ion-input>
          </ion-item>
          <ion-item lines="none">
            <ion-input type="text" [(ngModel)]="flight.destino" placeholder="Ej: Zona Incendio A" label="Destino"
              labelPlacement="stacked"></ion-input>
          </ion-item>
        </div>
      </div>

      <!-- Sección: Horario -->
      <div class="form-section">
        <span class="section-label">HORARIO</span>
        <div class="field-card">
          <ion-item lines="inset">
            <ion-input type="time" [(ngModel)]="flight.horaInicio" label="Hora de Inicio"
              labelPlacement="stacked"></ion-input>
          </ion-item>
          <ion-item lines="none">
            <ion-input type="time" [(ngModel)]="flight.horaFin" label="Hora de Fin"
              labelPlacement="stacked"></ion-input>
          </ion-item>
        </div>
      </div>

      <!-- Sección: Mediciones -->
      <div class="form-section">
        <span class="section-label">MEDICIONES</span>
        <div class="field-card">
          <div class="metrics-grid">
            <div class="metric-item">
              <span class="metric-label">Odómetro Inicial</span>
              <ion-input type="number" [(ngModel)]="flight.odometroInicio" class="metric-input"></ion-input>
            </div>
            <div class="metric-item">
              <span class="metric-label">Odómetro Final</span>
              <ion-input type="number" [(ngModel)]="flight.odometroFin" class="metric-input"></ion-input>
            </div>
            <div class="metric-item">
              <span class="metric-label">Tiros de Agua</span>
              <ion-input type="number" [(ngModel)]="flight.tirosDeAgua" class="metric-input"></ion-input>
            </div>
            <div class="metric-item">
              <span class="metric-label">Puestas en Marcha</span>
              <ion-input type="number" [(ngModel)]="flight.puestaEnMarcha" class="metric-input"></ion-input>
            </div>
          </div>
        </div>
      </div>

      <ion-button (click)="guardar()" class="save-btn" expand="block">GUARDAR REGISTRO</ion-button>

      <div class="footer-link">
        <a routerLink="/flight-list">← Volver al historial</a>
      </div>
    </div>
  </div>
</ion-content>
